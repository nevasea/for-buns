<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yêu bé trang của anh</title>
    <style>
        /* GIỮ NGUYÊN FORM CŨ CỦA BẠN */
        body {
            margin: 0;
            padding: 0;
            background: #a1c4fd;
            overflow-x: hidden;
            font-family: sans-serif;
        }

        .banner {
            width: 100%;
            padding-top: 5rem;
            padding-bottom: 5rem;
            text-align: center !important;
            color: white !important;
            position: relative;
            z-index: 10;
        }

        .slogan {
            background-color: rgb(248, 249, 250) !important;
            text-align: center !important;
            width: 100%;
            padding-top: 3rem;
            padding-bottom: 3rem;
            position: relative;
            z-index: 10;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            margin-top: 2rem;
            max-width: 100%;
            padding-right: 3rem;
            padding-left: 3rem;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        div a {
            text-decoration: none;
            color: #4a90e2;
            font-weight: bold;
            background: white;
            padding: 15px 25px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
            transition: 0.3s;
            border: 1px solid #ddd;
        }

        div a:hover {
            color: red;
            transform: scale(1.1);
        }

        /* HIỆU ỨNG RƠI BLINK BLINK */
        .falling-item {
            position: fixed; /* Dùng fixed để đảm bảo nó luôn hiển thị trên màn hình */
            top: -60px;
            user-select: none;
            pointer-events: none;
            z-index: 9999; /* Đẩy lên cao nhất để không bị banner che */
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        .blink {
            animation: fall linear forwards, blink-anim 0.8s infinite alternate;
        }

        @keyframes blink-anim {
            from { opacity: 0.3; filter: drop-shadow(0 0 5px white); }
            to { opacity: 1; filter: drop-shadow(0 0 15px white); }
        }
    </style>
</head>
<body>

    <div class="banner">
        <h1>yêu bé trang của anh 💙</h1>
        <p style="font-size: 1.2rem; font-weight: bold; color: #ffeb3b;">anh xin lỗi bé yêu của anh mình quay lại nha 🥺</p>
    </div>

    <div class="slogan">
        <h2>Học tốt nha bé iu ✨</h2>
    </div>

    <div class="row">
        <!-- GIỮ NGUYÊN CHỮ VUI VUI CỦA BẠN -->
        <a href="https://azota.vn/de-thi/qqxokw" target="_blank">tíng amh</a>
        <a href="https://azota.vn/de-thi/fzlk7f" target="_blank">tin họt</a>
        <a href="https://azota.vn/de-thi/igzupa" target="_blank">hoá họt</a>
        <a href="https://azota.vn/de-thi/ekvwn6" target="_blank">lịch sử</a>
        <a href="https://azota.vn/de-thi/pcxzse" target="_blank">vật lí</a>
        <a href="https://azota.vn/de-thi/sqwd4x" target="_blank">sinh họt</a>
    </div>

    <script>
        function createFalling() {
            const el = document.createElement('div');
            el.className = 'falling-item';
            
            // Icon lấp lánh và Hà mã rơi
            const icons = ['🦛', '🦛', '💙', '✨', '⭐', '☁️', '💎', '🤍', '🌸'];
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];
            
            el.innerText = randomIcon;

            // Thiết lập hiệu ứng blink
            el.classList.add('blink');

            el.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 3 + 4; 
            el.style.animationDuration = duration + 's, 0.8s';
            
            // Chỉnh kích thước (Hà mã to hơn icon)
            const size = (randomIcon === '🦛') ? (Math.random() * 20 + 35) : (Math.random() * 15 + 15);
            el.style.fontSize = size + 'px';

            document.body.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, duration * 1000);
        }

        // Tạo rơi liên tục
        setInterval(createFalling, 350);
    </script>
</body>
</html>
