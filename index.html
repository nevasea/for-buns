<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anh xin lỗi bé yêu của anh ❤</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            color: #2c3e50;
        }

        /* Container không nền */
        .container {
            text-align: center;
            padding: 20px;
            z-index: 100; /* Đảm bảo chữ nằm trên nền */
            max-width: 480px;
            width: 92%;
            position: relative;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ffffff;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(74, 144, 226, 0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .sorry-text {
            color: #ff6b6b;
            font-weight: 700;
            font-size: 1.4rem;
            margin-bottom: 30px;
            display: block;
            text-shadow: 0 0 15px white;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 18px 25px;
            border-radius: 25px;
            color: #3a7bd5;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.2rem;
            border: 2px solid white;
        }

        .link-card:hover {
            transform: scale(1.05);
            background: #ffffff;
            box-shadow: 0 12px 25px rgba(74, 144, 226, 0.4);
        }

        /* HIỆU ỨNG RƠI - QUAN TRỌNG NHẤT */
        .falling-item {
            position: fixed;
            top: -100px;
            user-select: none;
            pointer-events: none;
            z-index: 9999; /* Luôn nổi trên tất cả mọi thứ */
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); }
            100% { transform: translateY(115vh) rotate(360deg); }
        }

        .footer-message {
            margin-top: 30px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>yêu bé trang 💙</h1>
        <span class="sorry-text">anh xin lỗi bé yêu, mình quay lại nha! 🥺</span>
        
        <div class="links-container">
            <a href="https://azota.vn/de-thi/7zlsbe" target="_blank" class="link-card">
                <span>🇬🇧 tíng anh</span>
                <span>✨</span>
            </a>
            <a href="https://azota.vn/de-thi/djcsao" target="_blank" class="link-card">
                <span>💻 tin họt</span>
                <span>✨</span>
            </a>
            <a href="https://azota.vn/de-thi/cftqes" target="_blank" class="link-card">
                <span>🧪 hoá họt</span>
                <span>✨</span>
            </a>
            <a href="https://azota.vn/de-thi/xgv9vg" target="_blank" class="link-card">
                <span>📜 lịch sử</span>
                <span>✨</span>
            </a>
            <a href="https://azota.vn/de-thi/pcxzse" target="_blank" class="link-card">
                <span>⚡ vật lí</span>
                <span>✨</span>
            </a>
            <a href="https://azota.vn/de-thi/h7rovk" target="_blank" class="link-card">
                <span>🧬 sinh họt</span>
                <span>✨</span>
            </a>
        </div>
        
        <div class="footer-message">
            làm bài tốt nha bé yêu của anh ✨
        </div>
    </div>

    <script>
        function createFalling() {
            const item = document.createElement('div');
            item.className = 'falling-item';
            
            // Danh sách icon (Ưu tiên Hà mã và Trái tim)
            const icons = ['🦛', '🦛', '🦛', '💙', '✨', '⭐', '🌸', '🤍', '🥺'];
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];
            item.innerText = randomIcon;
            
            // Vị trí ngẫu nhiên
            item.style.left = Math.random() * 95 + "vw";
            
            // Thời gian rơi
            const duration = Math.random() * 3 + 4; // Rơi trong 4-7s
            item.style.animation = `fall ${duration}s linear forwards`;
            
            // Kích thước (Hà mã to hơn)
            if (randomIcon === '🦛') {
                item.style.fontSize = Math.random() * 20 + 40 + "px"; // 40px - 60px
                item.style.zIndex = "10000";
            } else {
                item.style.fontSize = Math.random() * 10 + 20 + "px"; // 20px - 30px
            }
            
            document.body.appendChild(item);
            
            // Xóa sau khi rơi xong
            setTimeout(() => {
                item.remove();
            }, duration * 1000);
        }

        // Tốc độ rơi: mỗi 300ms ra 1 con
        setInterval(createFalling, 300);
    </script>
</body>
</html>
